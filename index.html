<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sugaryu Tools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
    }

    header p {
      margin-top: 8px;
      color: #666;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 860px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }

    .card.coming-soon {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }

    .card-icon {
      font-size: 1.8rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    .card-desc {
      font-size: 0.875rem;
      color: #888;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      width: fit-content;
    }

    .badge.live { background: #1a3a1a; color: #4caf50; }
    .badge.soon { background: #2a2a1a; color: #888; }

    footer {
      margin-top: 60px;
      color: #333;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Sugaryu Tools</h1>
    <p>AI 驱动的个人工具集</p>
  </header>

  <div class="grid">
    <a href="https://quant.sugaryu.xyz" class="card">
      <div class="card-icon">📈</div>
      <div class="card-title">量化 1.0</div>
      <div class="card-desc">股票量化分析与持仓统计工具</div>
      <span class="badge live">上线</span>
    </a>

    <a href="https://worldcup.sugaryu.xyz" class="card">
      <div class="card-icon">⚽</div>
      <div class="card-title">世界杯 2026 预测</div>
      <div class="card-desc">2026 世界杯赛程预测与数据分析</div>
      <span class="badge live">上线</span>
    </a>

    <div class="card coming-soon">
      <div class="card-icon">🤖</div>
      <div class="card-title">量化 2.0</div>
      <div class="card-desc">下一代量化交易工具，迭代中</div>
      <span class="badge soon">即将上线</span>
    </div>
  </div>

  <footer>sugaryu.xyz</footer>

</body>
</html>
